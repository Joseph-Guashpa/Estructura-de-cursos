<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursos de Alemán</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- React y Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.06);
      --radius: 0.75rem;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 50%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.03);
      border: 1px solid rgba(203, 213, 225, 0.5);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 2rem;
      color: #0f172a;
      margin-bottom: 0.25rem;
    }
    h1 i {
      color: #2563eb;
      font-size: 2rem;
      background: #eff6ff;
      padding: 0.6rem;
      border-radius: 0.75rem;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      padding-left: 3.5rem;
      opacity: 0.8;
    }

    /* Tree */
    .tree {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .tree ul {
      list-style: none;
      margin: 0;
      padding-left: 2rem;
      position: relative;
    }
    .tree ul::before {
      content: '';
      position: absolute;
      top: 0.5rem;
      left: 0.85rem;
      bottom: 0.5rem;
      width: 2px;
      background: linear-gradient(to bottom, #cbd5e1, #e2e8f0, #cbd5e1);
      border-radius: 1px;
    }
    .tree li {
      position: relative;
      margin: 0.4rem 0;
      padding-left: 2rem;
    }
    .tree li::before {
      content: '';
      position: absolute;
      left: 0.85rem;
      top: 1.25rem;
      width: 1.15rem;
      height: 2px;
      background: #cbd5e1;
      border-radius: 1px;
    }
    .tree li:last-child::after {
      content: '';
      position: absolute;
      left: 0.85rem;
      top: 1.25rem;
      bottom: -0.4rem;
      width: 2rem;
      background: #f8fafc;
      z-index: 0;
    }

    /* Node cards */
    .node {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      padding: 0.5rem 1rem 0.5rem 0.8rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-weight: 500;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
      transition: all var(--transition);
      white-space: nowrap;
      cursor: default;
    }
    .node i {
      font-size: 0.9rem;
      width: 1.2rem;
      text-align: center;
    }

    /* Nivel colors */
    .level-0 > .node {
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border-color: #bfdbfe;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 0.6rem 1.2rem;
    }
    .level-0 > .node i { color: #1e40af; }
    .level-1 > .node {
      background: #f0f9ff;
      border-color: #bae6fd;
      font-weight: 600;
    }
    .level-1 > .node i { color: #0369a1; }
    .level-2 > .node {
      background: #f5f3ff;
      border-color: #ddd6fe;
      font-weight: 600;
    }
    .level-2 > .node i { color: #6d28d9; }
    .level-3 > .node {
      background: #fdf4ff;
      border-color: #f0abfc;
    }
    .level-3 > .node i { color: #a21caf; }
    .level-4 > .node {
      background: #ecfeff;
      border-color: #a5f3fc;
    }
    .level-4 > .node i { color: #0e7490; }
    .level-5 > .node {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }
    .level-5 > .node i { color: #15803d; }
    .level-6 > .node {
      background: #fff7ed;
      border-color: #fed7aa;
    }
    .level-6 > .node i { color: #c2410c; }
    .level-7 > .node {
      background: #f8fafc;
      border-style: dashed;
      opacity: 0.85;
    }
    .level-7 > .node i { color: #64748b; }

    .node:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    /* details / summary */
    .tree details { display: block; }
    .tree summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .tree summary::-webkit-details-marker { display: none; }
    .tree summary::marker { display: none; }

    .tree summary .node::after {
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      content: '\f0da'; /* fa-caret-right */
      margin-left: 0.5rem;
      font-size: 0.8rem;
      transition: transform var(--transition);
      opacity: 0.6;
    }
    details[open] > summary .node::after {
      transform: rotate(90deg);
    }
    .leaf .node::after { display: none; }

    @media (max-width: 768px) {
      .container { padding: 1.5rem 1rem; }
      .tree ul { padding-left: 1.25rem; }
      .tree li { padding-left: 1.25rem; }
      .tree li::before { width: 0.7rem; left: 0.5rem; }
      .tree ul::before { left: 0.5rem; }
      .node { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>

      const hasChildren = node.children && node.children.length > 0;
      const className = `level-${node.level}${!hasChildren ? ' leaf' : ''}`;

      if (!hasChildren) {
        return (
          <li className={className}>
            <span className="node">
              <i className={node.icon}></i> {node.name}
            </span>
          </li>
        );
      }

      return (
        <li className={className}>
          <details open>
            <summary>
              <span className="node">
                <i className={node.icon}></i> {node.name}
              </span>
            </summary>
            <ul>
              {node.children.map((child, idx) => (
                <TreeNode key={idx} node={child} />
              ))}
            </ul>
          </details>
        </li>
      );
    };
