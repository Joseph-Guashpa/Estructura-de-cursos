<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursos de Alemán – Árbol completo unificado</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- React y Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.06);
      --radius: 0.75rem;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 50%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 1300px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.03);
      border: 1px solid rgba(203, 213, 225, 0.5);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 2rem;
      color: #0f172a;
      margin-bottom: 0.25rem;
    }
    h1 i {
      color: #2563eb;
      font-size: 2rem;
      background: #eff6ff;
      padding: 0.6rem;
      border-radius: 0.75rem;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      padding-left: 3.5rem;
      opacity: 0.8;
    }

    /* Tree */
    .tree {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .tree ul {
      list-style: none;
      margin: 0;
      padding-left: 2rem;
      position: relative;
    }
    .tree ul::before {
      content: '';
      position: absolute;
      top: 0.5rem;
      left: 0.85rem;
      bottom: 0.5rem;
      width: 2px;
      background: linear-gradient(to bottom, #cbd5e1, #e2e8f0, #cbd5e1);
      border-radius: 1px;
    }
    .tree li {
      position: relative;
      margin: 0.4rem 0;
      padding-left: 2rem;
    }
    .tree li::before {
      content: '';
      position: absolute;
      left: 0.85rem;
      top: 1.25rem;
      width: 1.15rem;
      height: 2px;
      background: #cbd5e1;
      border-radius: 1px;
    }
    .tree li:last-child::after {
      content: '';
      position: absolute;
      left: 0.85rem;
      top: 1.25rem;
      bottom: -0.4rem;
      width: 2rem;
      background: #f8fafc;
      z-index: 0;
    }

    /* Node cards */
    .node {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      padding: 0.5rem 1rem 0.5rem 0.8rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-weight: 500;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
      transition: all var(--transition);
      white-space: nowrap;
      cursor: default;
    }
    .node i {
      font-size: 0.9rem;
      width: 1.2rem;
      text-align: center;
    }

    /* Nivel colors */
    .level-0 > .node {
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border-color: #bfdbfe;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 0.6rem 1.2rem;
    }
    .level-0 > .node i { color: #1e40af; }
    .level-1 > .node {
      background: #f0f9ff;
      border-color: #bae6fd;
      font-weight: 600;
    }
    .level-1 > .node i { color: #0369a1; }
    .level-2 > .node {
      background: #f5f3ff;
      border-color: #ddd6fe;
      font-weight: 600;
    }
    .level-2 > .node i { color: #6d28d9; }
    .level-3 > .node {
      background: #fdf4ff;
      border-color: #f0abfc;
    }
    .level-3 > .node i { color: #a21caf; }
    .level-4 > .node {
      background: #ecfeff;
      border-color: #a5f3fc;
    }
    .level-4 > .node i { color: #0e7490; }
    .level-5 > .node {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }
    .level-5 > .node i { color: #15803d; }
    .level-6 > .node {
      background: #fff7ed;
      border-color: #fed7aa;
    }
    .level-6 > .node i { color: #c2410c; }
    .level-7 > .node {
      background: #f8fafc;
      border-style: dashed;
      opacity: 0.85;
    }
    .level-7 > .node i { color: #64748b; }

    .node:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    /* details / summary */
    .tree details { display: block; }
    .tree summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .tree summary::-webkit-details-marker { display: none; }
    .tree summary::marker { display: none; }

    .tree summary .node::after {
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      content: '\f0da'; /* fa-caret-right */
      margin-left: 0.5rem;
      font-size: 0.8rem;
      transition: transform var(--transition);
      opacity: 0.6;
    }
    details[open] > summary .node::after {
      transform: rotate(90deg);
    }
    .leaf .node::after { display: none; }

    @media (max-width: 768px) {
      .container { padding: 1.5rem 1rem; }
      .tree ul { padding-left: 1.25rem; }
      .tree li { padding-left: 1.25rem; }
      .tree li::before { width: 0.7rem; left: 0.5rem; }
      .tree ul::before { left: 0.5rem; }
      .node { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Helpers para construir nodos repetitivos
    const createModalityNode = (modalities, levelBase = 4) => {
      const children = modalities.map(mod => ({
        name: mod.name,
        icon: mod.icon,
        level: levelBase + 1,
        children: [{
          name: "Horario",
          icon: "fa-solid fa-clock",
          level: levelBase + 2,
          children: (mod.horarios && mod.horarios.length > 0 ? mod.horarios.map(h => ({
            name: h,
            icon: "fa-regular fa-hourglass-half",
            level: levelBase + 3,
            children: [{ name: "Docente", icon: "fa-solid fa-chalkboard-user", level: levelBase + 4, leaf: true }]
          })) : [{
            name: "Horario no definido",
            icon: "fa-regular fa-hourglass-half",
            level: levelBase + 3,
            children: [{ name: "Docente", icon: "fa-solid fa-chalkboard-user", level: levelBase + 4, leaf: true }]
          }])
        }]
      }));

      return {
        name: "Modalidad",
        icon: "fa-solid fa-building-columns",
        level: levelBase,
        children: children
      };
    };

    // Construcción de la estructura de horarios para los tipos antiguos
    const horariosIntensivoKennedy = [
      { name: "10h00-12h00", icon: "fa-regular fa-hourglass-half" },
      { name: "15h00-17h00", icon: "fa-regular fa-hourglass-half" },
      { name: "17h30-19h30", icon: "fa-regular fa-hourglass-half" }
    ];
    const horarioVirtualIntensivoKennedy = [{ name: "19h30-21h30", icon: "fa-regular fa-hourglass-half" }];
    const horariosSuperIntensivoKennedy = [
      { name: "09h00-12h00", icon: "fa-regular fa-hourglass-half" },
      { name: "14h00-17h00", icon: "fa-regular fa-hourglass-half" }
    ];
    const horarioVirtualSuperIntensivoKennedy = [{ name: "18h30-21h30", icon: "fa-regular fa-hourglass-half" }];
    const horariosSabatino = [
      { name: "09h30-13h00", icon: "fa-regular fa-hourglass-half" },
      { name: "14h00-17h30", icon: "fa-regular fa-hourglass-half" }
    ];
    const horariosJuvenil = [
      { name: "Semanal 16h30-18h00", icon: "fa-regular fa-hourglass-half" },
      { name: "Sabatino 10h00-13h15", icon: "fa-regular fa-hourglass-half" },
      { name: "Sabatino 14h00-17h15", icon: "fa-regular fa-hourglass-half" }
    ];

    // Módulos según tipo y nivel
    const modulosIntensivoSuper = {
      A1: ["A1.1", "A1.2"],
      A2: ["A2.1", "A2.2"],
      B1: ["B1.1", "B1.2", "B1.3"],
      B2: ["B2.1", "B2.2", "B2.3"]
    };
    const modulosSabatinoJuvenil = {
      A1: ["A1-M1", "A1-M2", "A1-M3", "A1-M4"],
      A2: ["A2-M1", "A2-M2", "A2-M3", "A2-M4"],
      B1: ["B1-M1", "B1-M2", "B1-M3", "B1-M4"],
      B2: ["B2-M1", "B2-M2", "B2-M3", "B2-M4"]
    };

    const niveles = ["A1", "A2", "B1", "B2"];

    // Función para construir un nivel completo con módulos y modalidades
    const buildNivel = (nivel, tipo, sede) => {
      let modulosArray = [];
      if (tipo === "Intensivo" || tipo === "SuperIntensivo") {
        modulosArray = modulosIntensivoSuper[nivel];
      } else if (tipo === "Sabatino" || tipo === "Juvenil") {
        modulosArray = modulosSabatinoJuvenil[nivel];
      }

      const moduloNode = {
        name: "Módulos",
        icon: "fa-solid fa-cubes",
        level: 4,
        children: modulosArray.map(m => ({
          name: m,
          icon: "fa-regular fa-file-alt",
          level: 5,
          leaf: true
        }))
      };

      let modalidadNode;

      if (tipo === "Intensivo" && sede === "Kennedy") {
        modalidadNode = createModalityNode([
          { name: "Presencial", icon: "fa-solid fa-user-check", horarios: horariosIntensivoKennedy.map(h => h.name) },
          { name: "Híbrido", icon: "fa-solid fa-arrows-left-right", horarios: horariosIntensivoKennedy.map(h => h.name) },
          { name: "Virtual", icon: "fa-solid fa-laptop", horarios: horarioVirtualIntensivoKennedy.map(h => h.name) }
        ], 4);
      } else if (tipo === "Intensivo" && sede === "Samborondón") {
        modalidadNode = createModalityNode([
          { name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["16h00-18h00", "18h30-20h30"] },
          { name: "Híbrido", icon: "fa-solid fa-arrows-left-right", horarios: ["16h00-18h00", "18h30-20h30"] }
        ], 4);
      } else if (tipo === "SuperIntensivo" && sede === "Kennedy") {
        modalidadNode = createModalityNode([
          { name: "Presencial", icon: "fa-solid fa-user-check", horarios: horariosSuperIntensivoKennedy.map(h => h.name) },
          { name: "Híbrido", icon: "fa-solid fa-arrows-left-right", horarios: horariosSuperIntensivoKennedy.map(h => h.name) },
          { name: "Virtual", icon: "fa-solid fa-laptop", horarios: horarioVirtualSuperIntensivoKennedy.map(h => h.name) }
        ], 4);
      } else if (tipo === "Sabatino") {
        modalidadNode = createModalityNode([
          { name: "Presencial", icon: "fa-solid fa-user-check", horarios: horariosSabatino.map(h => h.name) },
          { name: "Híbrido", icon: "fa-solid fa-arrows-left-right", horarios: horariosSabatino.map(h => h.name) },
          { name: "Virtual", icon: "fa-solid fa-laptop", horarios: horariosSabatino.map(h => h.name) }
        ], 4);
      } else if (tipo === "Juvenil") {
        modalidadNode = createModalityNode([
          { name: "Presencial", icon: "fa-solid fa-user-check", horarios: horariosJuvenil.map(h => h.name) },
          { name: "Híbrido", icon: "fa-solid fa-arrows-left-right", horarios: horariosJuvenil.map(h => h.name) },
          { name: "Virtual", icon: "fa-solid fa-laptop", horarios: horariosJuvenil.map(h => h.name) }
        ], 4);
      }

      return {
        name: nivel,
        icon: nivel.startsWith("A") ? "fa-solid fa-a" : "fa-solid fa-b",
        level: 3,
        children: [moduloNode, modalidadNode]
      };
    };

    // Construcción de los tipos anteriores para una sede
    const buildOldTypes = (sede) => {
      const tipos = [];
      // Intensivo
      const intensivoNiveles = niveles.map(nivel => buildNivel(nivel, "Intensivo", sede));
      tipos.push({
        name: "Intensivo",
        icon: "fa-solid fa-bolt",
        level: 2,
        children: intensivoNiveles
      });

      // SuperIntensivo solo Kennedy
      if (sede === "Kennedy") {
        const superNiveles = niveles.map(nivel => buildNivel(nivel, "SuperIntensivo", sede));
        tipos.push({
          name: "SuperIntensivo",
          icon: "fa-solid fa-fire",
          level: 2,
          children: superNiveles
        });
      }

      // Sabatino
      const sabatinoNiveles = niveles.map(nivel => buildNivel(nivel, "Sabatino", sede));
      tipos.push({
        name: "Sabatino",
        icon: "fa-solid fa-calendar-day",
        level: 2,
        children: sabatinoNiveles
      });

      // Juvenil
      const juvenilNiveles = niveles.map(nivel => buildNivel(nivel, "Juvenil", sede));
      tipos.push({
        name: "Juvenil",
        icon: "fa-solid fa-child",
        level: 2,
        children: juvenilNiveles
      });

      return tipos;
    };

    // Construcción de los nuevos tipos (comunes a ambas sedes)
    const buildNewTypes = () => {
      return [
        {
          name: "Preparación Exámenes",
          icon: "fa-solid fa-file-pen",
          level: 2,
          children: [
            { name: "Goethe Zertifikat Start A1", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] },
            { name: "Goethe Zertifikat Start A2", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] },
            { name: "Goethe Zertifikat B1", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] },
            { name: "Goethe Zertifikat B2", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] }
          ]
        },
        {
          name: "Preparación DSD",
          icon: "fa-solid fa-language",
          level: 2,
          children: [
            { name: "DSD I (A2-B1)", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] },
            { name: "DSD II (B2-C1)", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] }
          ]
        },
        {
          name: "Preparación IVA",
          icon: "fa-solid fa-book-open",
          level: 2,
          children: [
            { name: "IVA A1", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] },
            { name: "IVA A2", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] }
          ]
        },
        {
          name: "Cursos Vacacionales",
          icon: "fa-solid fa-umbrella-beach",
          level: 2,
          children: [
            { name: "Vacacional Infanto-Juveniles (A1)", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] },
            { name: "Vacacionales Refuerzo (CAH)", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }], 4)] }
          ]
        },
        {
          name: "Taller Práctico",
          icon: "fa-solid fa-person-chalkboard",
          level: 2,
          children: [
            { name: "General", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] }
          ]
        },
        {
          name: "Clases Particulares",
          icon: "fa-solid fa-user-graduate",
          level: 2,
          children: [
            { name: "General", icon: "fa-solid fa-certificate", level: 3, children: [createModalityNode([{ name: "Presencial", icon: "fa-solid fa-user-check", horarios: ["Horario no definido"] }, { name: "Virtual", icon: "fa-solid fa-laptop", horarios: ["Horario no definido"] }], 4)] }
          ]
        }
      ];
    };

    // Árbol completo
    const treeData = {
      name: "Ciclo",
      icon: "fa-solid fa-arrows-spin",
      level: 0,
      children: [
        {
          name: "Kennedy",
          icon: "fa-solid fa-location-dot",
          level: 1,
          children: [
            ...buildOldTypes("Kennedy"),
            ...buildNewTypes()
          ]
        },
        {
          name: "Samborondón",
          icon: "fa-solid fa-location-dot",
          level: 1,
          children: [
            ...buildOldTypes("Samborondón"),
          ]
        }
      ]
    };

    // Componente recursivo
    const TreeNode = ({ node }) => {
      const hasChildren = node.children && node.children.length > 0;
      const className = `level-${node.level}${!hasChildren ? ' leaf' : ''}`;

      if (!hasChildren) {
        return (
          <li className={className}>
            <span className="node">
              <i className={node.icon}></i> {node.name}
            </span>
          </li>
        );
      }

      return (
        <li className={className}>
          <details open>
            <summary>
              <span className="node">
                <i className={node.icon}></i> {node.name}
              </span>
            </summary>
            <ul>
              {node.children.map((child, idx) => (
                <TreeNode key={idx} node={child} />
              ))}
            </ul>
          </details>
        </li>
      );
    };

    const App = () => {
      return (
        <div className="container">
          <h1>
            <i className="fa-solid fa-sitemap"></i>
            Árbol de Cursos de Alemán – Completo
          </h1>
          <p className="subtitle">
            Ciclo → Sede → Tipo → Nivel → Módulo → Modalidad → Horario → Docente
          </p>
          <ul className="tree">
            <TreeNode node={treeData} />
          </ul>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
